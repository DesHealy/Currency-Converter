<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 10px; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .box { background: #1a1a1a; padding: 25px; border-radius: 35px; width: 95%; text-align: center; border: 2px solid #333; }
        .val { font-size: 3.2rem; color: #00ff88; font-weight: 800; margin: 5px 0; font-variant-numeric: tabular-nums; }
        .label { font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        
        input[type=range] { 
            width: 100%; 
            height: 45px; 
            background: #222; 
            border-radius: 25px; 
            outline: none; 
            margin: 25px 0; 
            -webkit-appearance: none; 
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 55px;
            height: 55px;
            background: #00ff88;
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid #fff;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="label">Euro (EUR)</div>
        <div class="val" id="eurShow">40</div>
        
        <input type="range" id="eurSlider" min="0" max="500" value="40" step="1">

        <div class="label">Czech Koruna (CZK)</div>
        <div class="val" id="czkShow">1012.00</div>
    </div>

    <script>
        const rate = 25.30;
        const slider = document.getElementById('eurSlider');
        const eurShow = document.getElementById('eurShow');
        const czkShow = document.getElementById('czkShow');

        slider.oninput = function() {
            let eurVal = parseInt(this.value);
            eurShow.innerText = eurVal; 
            czkShow.innerText = (eurVal * rate).toFixed(2); 
        };
    </script>
</body>
</html>
