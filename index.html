<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            margin: 0;
            background: #f0f2f5; 
        }
        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 24px; 
            width: 85%; 
            max-width: 360px; 
            height: 300px; /* Fixed height stops the "jumping" */
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
        }
        #czk { 
            font-size: 3.2rem; 
            font-weight: 800; 
            color: #1a1a1a; 
            margin: 0;
            line-height: 1;
        }
        #eur { 
            font-size: 1.4rem; 
            color: #666; 
            margin-top: 10px;
        }
        
        /* The Refined "Small Touch" Slider */
        input[type=range] { 
            width: 100%; 
            height: 6px; /* Back to thin and clean */
            border-radius: 5px; 
            background: #e0e0e0; 
            outline: none; 
            -webkit-appearance: none;
            margin: 40px 0 20px 0;
        }
        
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            width: 22px; /* Original smaller size */
            height: 22px; 
            background: #007AFF; /* iOS Blue */
            border-radius: 50%; 
            cursor: pointer; 
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        .rate-tag { 
            font-size: 0.8rem; 
            color: #bbb; 
            margin: 0;
        }
    </style>
</head>
<body>

<div class="card">
    <div>
        <div id="czk">0.00 CZK</div>
        <div id="eur">0 EUR</div>
    </div>
    
    <input type="range" id="slider" min="0" max="150" value="40" step="1">
    
    <div class="rate-tag" id="status">Fetching live rate...</div>
</div>
