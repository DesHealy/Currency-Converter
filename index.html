<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 10px; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .box { background: #1a1a1a; padding: 20px; border-radius: 30px; width: 95%; text-align: center; border: 1px solid #333; }
        .val { font-size: 3rem; color: #00ff88; font-weight: 800; margin: 5px 0; font-variant-numeric: tabular-nums; }
        .label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
        
        input[type=range] { 
            width: 100%; 
            height: 40px; 
            background: #333; 
            border-radius: 20px; 
            outline: none; 
            margin: 20px 0; 
            -webkit-appearance: none; 
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 45px;
            height: 45px;
            background: #00ff88;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #fff;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="label">CZK (Czech)</div>
        <div class="val" id="czkShow">100</div>
        
        <input type="range" id="czkSlider" min="0" max="1000" value="100" step="1">

        <div class="label">EUR (Euro)</div>
        <div class="val" id="eurShow">3.95</div>
    </div>

    <script>
        const rate = 25.30;
        const slider = document.getElementById('czkSlider');
        const czkShow = document.getElementById('czkShow');
        const eurShow = document.getElementById('eurShow');

        slider.oninput = function() {
            let val = parseInt(this.value);
            czkShow.innerText = val;
            eurShow.innerText = (val / rate).toFixed(2);
        };
    </script>
</body>
</html>
