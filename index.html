<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUR to CZK Live</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: #121212; /* Deep Dark */
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e1e1e;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            width: 85%;
            max-width: 380px;
            border: 1px solid #333;
        }
        .czk-display {
            font-size: 3.5rem;
            font-weight: 800;
            color: #4CAF50; /* High Contrast Green */
            margin-bottom: 0.2rem;
        }
        .eur-label {
            font-size: 1.5rem;
            color: #b0b0b0;
            margin-bottom: 2.5rem;
        }
        input[type=range] {
            width: 100%;
            -webkit-appearance: none;
            background: #333;
            height: 10px;
            border-radius: 5px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 28px;
            background: #4CAF50;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid #1e1e1e;
        }
        .status {
            font-size: 0.8rem;
            color: #666;
            margin-top: 1.5rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="czk-display" id="czk">-- CZK</div>
    <div class="eur-label" id="eur">0 EUR</div>
    
    <input type="range" id="slider" min="0" max="250" value="40">
    
    <div class="status" id="status">Syncing live rates...</div>
</div>

<script>
    const slider = document.getElementById('slider');
    const czkDisp = document.getElementById('czk');
    const eurDisp = document.getElementById('eur');
    const statusDisp = document.getElementById('status');

    let currentRate = 24.39; // Safety fallback

    async function fetchRate() {
        try {
            const res = await fetch('https://open.er-api.com/v6/latest/EUR');
            const data = await res.json();
            currentRate = data.rates.CZK;
            statusDisp.innerText = `LIVE: 1 EUR = ${currentRate.toFixed(2)} CZK`;
            update();
        } catch (e) {
            statusDisp.innerText = `OFFLINE (Using ${currentRate} CZK)`;
            update();
        }
    }

    function update() {
        const eur = slider.value;
        const czk = (eur * currentRate).toLocaleString('cs-CZ', { minimumFractionDigits: 2 });
        eurDisp.innerText = `${eur} EUR`;
        czkDisp.innerText = `${czk} CZK`;
    }

    slider.oninput = update;
    fetchRate(); // Run on load
</script>

</body>
</html>
