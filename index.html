<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #1a1a1a; color: white; }
        .card { background: #2a2a2a; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #czk { font-size: 3.5rem; font-weight: bold; margin: 10px 0; color: #4CAF50; }
        #eur { font-size: 1.8rem; color: #aaa; margin-bottom: 30px; }
        
        /* The Bigger Slider Styling */
        input[type=range] { 
            width: 100%; 
            height: 24px; /* Thicker Track */
            border-radius: 12px; 
            background: #444; 
            outline: none; 
            -webkit-appearance: none;
            margin: 20px 0;
        }
        
        /* The Grabbable Circle (Chrome/Safari/Android) */
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            width: 40px; /* Big Thumb */
            height: 40px; 
            background: #4CAF50; 
            border-radius: 50%; 
            cursor: pointer;
            border: 4px solid #2a2a2a;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .rate-tag { font-size: 0.9rem; color: #666; margin-top: 25px; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <div id="czk">0.00 CZK</div>
    <div id="eur">0 EUR</div>
    <input type="range" id="slider" min="0" max="150" value="40" step="1">
    <div class="rate-tag" id="status">Fetching live rate...</div>
</div>

<script>
    const slider = document.getElementById('slider');
    const czkDisp = document.getElementById('czk');
    const eurDisp = document.getElementById('eur');
    const status = document.getElementById('status');
    let rate = 24.39; 

    async function getLiveRate() {
        try {
            const res = await fetch('https://open.er-api.com/v6/latest/EUR');
            const data = await res.json();
            rate = data.rates.CZK;
            status.innerText = `Live: 1 EUR = ${rate.toFixed(2)} CZK`;
            update();
        } catch (e) {
            status.innerText = `Offline: Using ${rate} CZK`;
            update();
        }
    }

    function update() {
        const val = slider.value;
        eurDisp.innerText = val + " EUR";
        const total = (val * rate).toFixed(2);
        czkDisp.innerText = total + " CZK";
    }

    slider.oninput = update;
    getLiveRate();
</script>

</body>
</html>
