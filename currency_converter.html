<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#121212">
    <title>CZK/EUR Converter</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 85%; max-width: 320px; text-align: center; }
        input { width: 100%; background: #2c2c2c; border: 2px solid transparent; border-radius: 12px; color: #00ff88; font-size: 2.2rem; padding: 12px; margin: 12px 0; box-sizing: border-box; text-align: center; outline: none; transition: border 0.3s; }
        input:focus { border: 2px solid #00ff88; }
        label { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 1.2px; display: block; margin-top: 10px; }
        .rate-info { font-size: 0.7rem; color: #555; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="box">
        <label>Czech Koruna (CZK)</label>
        <input type="number" id="czk" placeholder="0" oninput="convert('czk')" inputmode="decimal">
        
        <label>Euro (EUR)</label>
        <input type="number" id="eur" placeholder="0" oninput="convert('eur')" inputmode="decimal">
        
        <div class="rate-info">Fixed Rate: 1 EUR = 25.30 CZK</div>
    </div>

    <script>

            [span_5](start_span)const eurInput = document.getElementById('eur');[span_5](end_span)
            if (source === 'czk') {
                [span_6](start_span)eurInput.value = (czkInput.value / RATE).toFixed(2);[span_6](end_span)
            } else {
                [span_7](start_span)czkInput.value = (eurInput.value * RATE).toFixed(2);[span_7](end_span)
            }
        }
    </script>
</body>
</html>
